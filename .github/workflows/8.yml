name: AlwaysData8 Login Monitor

on:
  workflow_dispatch:        # 手动触发
  schedule:
    - cron: "0 13 */26 * *" 

jobs:
  login-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      ALWAYS_EMAIL: ${{ secrets.ALWAYS_EMAIL8 }}
      ALWAYS_PASSWORD: ${{ secrets.ALWAYS_PASSWORD8 }}
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 🔐 启动 Cloudflare WARP（关键步骤）
      - name: 🌐 Enable Cloudflare WARP
        uses: fscarmen/warp-on-actions@main
        with:
          mode: client     # 客户端模式（最常用）

      # （可选）打印当前出口 IP，便于你验证
      - name: 🔎 Show IP after WARP
        run: curl https://ip.luckyxz.pp.ua/json || true

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 🌐 Set up Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-dependencies: true

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install DrissionPage requests

      - name: 🚀 Run alwaysdata login script
        run: |
          python login.py
